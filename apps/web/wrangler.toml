# -----------------------------------------------------------------------------
# Go2 Web - OpenNext Cloudflare Workers Configuration
# -----------------------------------------------------------------------------
# This file configures the Cloudflare Workers deployment for the Next.js web app
# using OpenNext.
#
# Build: pnpm build:cf
# Deploy: pnpm cf:deploy:production
# -----------------------------------------------------------------------------

name = "go2-web"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — backup tail buffer in the CF dashboard.
# Frontend errors are filtered + tunneled to Axiom via /api/v1/log
# (see apps/web/lib/logger.ts → apps/api/src/routes/v1/log.ts).
[observability]
enabled = true
head_sampling_rate = 1.0

# Assets (static files)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# KV Namespace for Next.js cache (ISR, etc.)
[[kv_namespaces]]
binding = "NEXT_CACHE_KV"
id = "3dc3ddae08064ba2b544e46df82e3a43"

# -----------------------------------------------------------------------------
# Environment Variables (Development)
# -----------------------------------------------------------------------------

[vars]
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
NEXT_PUBLIC_API_URL = "http://localhost:8787"
NEXT_PUBLIC_SITE_NAME = "Go2"
NEXT_PUBLIC_SITE_TAGLINE = "The agentic URL shortener"
NEXT_PUBLIC_SITE_DESCRIPTION = "Go2 is the agentic URL shortener. Branded, tracked, revocable short links — minted from your AI agent's tool call into the workspace you already own. MCP, per-run attribution, custom domains, lifecycle controls. Edge-native on Cloudflare. Open source."

# -----------------------------------------------------------------------------
# Production Environment
# -----------------------------------------------------------------------------

[env.production]
name = "go2-web-production"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.production.kv_namespaces]]
binding = "NEXT_CACHE_KV"
id = "3dc3ddae08064ba2b544e46df82e3a43"

# Service binding to the API worker so SSR fetches don't go through the
# public api.go2.gg route (worker -> public-route -> same-account worker
# was 522'ing in production for the bio page).
[[env.production.services]]
binding = "API"
service = "go2-api-production"

[env.production.vars]
NEXT_PUBLIC_APP_URL = "https://go2.gg"
NEXT_PUBLIC_API_URL = "https://api.go2.gg"
NEXT_PUBLIC_SITE_NAME = "Go2"
NEXT_PUBLIC_SITE_TAGLINE = "The agentic URL shortener"
NEXT_PUBLIC_SITE_DESCRIPTION = "Go2 is the agentic URL shortener. Branded, tracked, revocable short links — minted from your AI agent's tool call into the workspace you already own. MCP, per-run attribution, custom domains, lifecycle controls. Edge-native on Cloudflare. Open source."

# Custom domains for web app
[[env.production.routes]]
pattern = "go2.gg/*"
zone_name = "go2.gg"

[[env.production.routes]]
pattern = "www.go2.gg/*"
zone_name = "go2.gg"

# Production public env vars (set via wrangler secret put --env production):
# - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
# - NEXT_PUBLIC_POSTHOG_KEY
# - NEXT_PUBLIC_TURNSTILE_SITE_KEY

# -----------------------------------------------------------------------------
# Staging Environment
# -----------------------------------------------------------------------------

[env.staging]
name = "go2-web-staging"

[env.staging.vars]
NEXT_PUBLIC_APP_URL = "https://staging.go2.gg"
NEXT_PUBLIC_API_URL = "https://api-staging.go2.gg"
NEXT_PUBLIC_SITE_NAME = "Go2 (Staging)"
NEXT_PUBLIC_SITE_TAGLINE = "The agentic URL shortener"
NEXT_PUBLIC_SITE_DESCRIPTION = "Go2 is the agentic URL shortener. Branded, tracked, revocable short links — minted from your AI agent's tool call into the workspace you already own. MCP, per-run attribution, custom domains, lifecycle controls. Edge-native on Cloudflare. Open source."
